<section class="contact-page">
  <h1>Get in Touch</h1>

  <p class="intro">
    Feel free to reach out via email or connect with me on LinkedIn and GitHub.
  </p>

  <div class="links">
    <!-- Email -->
    <a
      class="link-item email"
      [href]="mailtoLink"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg
        aria-hidden="true"
        focusable="false"
        viewBox="0 0 24 24"
        class="icon"
      >
        <path
          d="M12 13.5l-11-7V19a2 2 0 002 2h18a2 2 0 002-2V6.5l-11 7zM12 12L1 5h22L12 12z"
        />
      </svg>
      <span>Email Me</span>
    </a>

    <!-- LinkedIn -->
    <a
      class="link-item linkedin"
      href="https://www.linkedin.com/in/your‑linkedin‑handle"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg
        aria-hidden="true"
        focusable="false"
        viewBox="0 0 24 24"
        class="icon"
      >
        <path
          d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0h4.8v2.2h.07c.67-1.27 2.31-2.6 4.76-2.6 5.09 0 6.03 3.34 6.03 7.68V24h-5v-8.5c0-2.02-.04-4.62-2.82-4.62-2.82 0-3.26 2.2-3.26 4.47V24h-5V8z"
        />
      </svg>
      <span>LinkedIn</span>
    </a>

    <!-- GitHub -->
    <a
      class="link-item github"
      href="https://github.com/your‑github‑username"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg
        aria-hidden="true"
        focusable="false"
        viewBox="0 0 24 24"
        class="icon"
      >
        <path
          d="M12 .5C5.73.5.5 5.73.5 12c0 5.09 3.29 9.41 7.86 10.95.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.55-3.88-1.55-.53-1.34-1.3-1.7-1.3-1.7-1.06-.73.08-.72.08-.72 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.75.41-1.27.74-1.56-2.55-.29-5.23-1.28-5.23-5.71 0-1.26.45-2.29 1.2-3.09-.12-.3-.52-1.51.11-3.14 0 0 .98-.31 3.21 1.18a11.2 11.2 0 012.92-.39c.99.004 1.99.134 2.92.39 2.22-1.49 3.2-1.18 3.2-1.18.63 1.63.23 2.84.11 3.14.75.8 1.2 1.83 1.2 3.09 0 4.44-2.69 5.42-5.25 5.71.42.36.8 1.07.8 2.16 0 1.56-.014 2.81-.014 3.19 0 .31.21.67.8.56A10.51 10.51 0 0023.5 12c0-6.27-5.23-11.5-11.5-11.5z"
        />
      </svg>
      <span>GitHub</span>
    </a>
  </div>
</section>
